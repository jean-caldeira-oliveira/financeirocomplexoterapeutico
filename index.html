<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONTROLE FINANCEIRO</title>
    <meta name="description" content="CONTROLE INTERNO" />
    <meta name="author" content="Complexo Terapêutico" />

    <!-- Resource hints: open TCP connections to external origins early so
         auth and API calls don't stall the render-blocking waterfall.
         Addresses the "Latência da solicitação de documentos" Lighthouse insight. -->
    <link rel="preconnect" href="https://accounts.google.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- ═══════════════════════════════════════════════════════════════════
         Content Security Policy (CSP)
         Protege contra XSS, clickjacking e injeção de conteúdo malicioso.

         Domínios permitidos:
           - *.supabase.co  → API, Auth e Edge Functions do Supabase
           - accounts.google.com → OAuth do Google
           - *.googleapis.com   → APIs do Google (OAuth)
           - fonts.gstatic.com  → Fontes do Google (se usadas)

         IMPORTANTE: Ao fazer deploy em produção, substitua 'self' pelo
         domínio real do seu app e remova 'unsafe-inline' do style-src
         adicionando um hash ou nonce gerado pelo servidor.
    ════════════════════════════════════════════════════════════════════ -->
    <!--
      CSP, X-Frame-Options, X-Content-Type-Options, Referrer-Policy,
      Strict-Transport-Security e Permissions-Policy são definidos como
      HTTP response headers no vercel.json (mais seguros e respeitados
      por todos os browsers). As meta tags equivalentes foram removidas
      para evitar duplicação e inconsistência.

      NOTA: 'unsafe-inline' foi removido de script-src. O Vite gera
      apenas <script type="module" src="/assets/..."> sem scripts inline,
      portanto 'self' é suficiente para o build de produção.
    -->

    <meta property="og:type" content="website" />
    <meta property="og:title" content="CONTROLE FINANCEIRO" />
    <meta property="og:description" content="CONTROLE INTERNO" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CONTROLE FINANCEIRO" />
    <meta name="twitter:description" content="CONTROLE INTERNO" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
