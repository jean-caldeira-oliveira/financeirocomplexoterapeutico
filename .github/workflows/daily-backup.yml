name: Daily Database Backup

on:
  schedule:
    # Runs every day at 03:00 UTC (00:00 Brasília / BRT)
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  backup:
    name: pg_dump → encrypt → upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Install PostgreSQL client ────────────────────────────────────────
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client gnupg awscli

      # ── 2. Create working directory ─────────────────────────────────────────
      - name: Prepare workspace
        run: mkdir -p /tmp/backups

      # ── 3. Dump the database ────────────────────────────────────────────────
      # SUPABASE_DB_HOST  → Project Settings → Database → Host
      # SUPABASE_DB_PASSWORD → Project Settings → Database → Password
      - name: Run pg_dump
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          DATE=$(date +%Y-%m-%d)
          pg_dump \
            --host="${{ secrets.SUPABASE_DB_HOST }}" \
            --port=5432 \
            --username=postgres \
            --dbname=postgres \
            --format=custom \
            --compress=9 \
            --no-password \
            --file="/tmp/backups/backup-${DATE}.dump"

          echo "✅ Dump created:"
          ls -lh /tmp/backups/

      # ── 4. Encrypt with GPG (AES-256) ───────────────────────────────────────
      # GPG_PASSPHRASE → a strong random passphrase stored in GitHub Secrets.
      # IMPORTANT: store this passphrase in a password manager — losing it
      # means losing access to ALL encrypted backups.
      - name: Encrypt backup
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "${{ secrets.GPG_PASSPHRASE }}" | \
            gpg --batch --yes \
                --passphrase-fd 0 \
                --symmetric \
                --cipher-algo AES256 \
                --output "/tmp/backups/backup-${DATE}.dump.gpg" \
                "/tmp/backups/backup-${DATE}.dump"

          # Remove unencrypted dump immediately
          rm "/tmp/backups/backup-${DATE}.dump"
          echo "✅ Backup encrypted:"
          ls -lh /tmp/backups/

      # ── 5. Upload to Cloudflare R2 (S3-compatible) ──────────────────────────
      # R2_ACCESS_KEY_ID     → Cloudflare Dashboard → R2 → Manage R2 API Tokens
      # R2_SECRET_ACCESS_KEY → same as above
      # R2_ENDPOINT_URL      → https://<account-id>.r2.cloudflarestorage.com
      # R2_BUCKET_NAME       → name of your R2 bucket (e.g. clinica-backups)
      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          aws s3 cp \
            "/tmp/backups/backup-${DATE}.dump.gpg" \
            "s3://${{ secrets.R2_BUCKET_NAME }}/clinica/backup-${DATE}.dump.gpg" \
            --no-progress

          echo "✅ Backup uploaded to R2: clinica/backup-${DATE}.dump.gpg"

      # ── 6. Prune backups older than 30 days ─────────────────────────────────
      - name: Delete backups older than 30 days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          CUTOFF=$(date -d '30 days ago' +%Y-%m-%d)
          echo "Removing backups older than ${CUTOFF}..."

          aws s3 ls "s3://${{ secrets.R2_BUCKET_NAME }}/clinica/" | \
            awk '{print $4}' | \
            while read -r file; do
              FILE_DATE=$(echo "$file" | grep -oP '\d{4}-\d{2}-\d{2}' || true)
              if [[ -n "$FILE_DATE" && "$FILE_DATE" < "$CUTOFF" ]]; then
                aws s3 rm "s3://${{ secrets.R2_BUCKET_NAME }}/clinica/$file"
                echo "🗑️  Deleted: $file"
              fi
            done

          echo "✅ Cleanup complete."

      # ── 7. Verify upload ────────────────────────────────────────────────────
      - name: List current backups in R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          echo "📦 Current backups in R2:"
          aws s3 ls "s3://${{ secrets.R2_BUCKET_NAME }}/clinica/" --human-readable

      # ── 8. Open a GitHub Issue on failure ───────────────────────────────────
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Daily backup FAILED — ${today}`,
              body: [
                '## Backup Failure Alert',
                '',
                `The automated daily database backup failed on **${today}**.`,
                '',
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '**Action required:** Check the Actions log immediately and perform a manual backup if needed.',
              ].join('\n'),
              labels: ['backup', 'critical'],
            });
